# H2 In-Memory Database for Local Development (Zero Config)
spring.datasource.url=jdbc:h2:mem:careernavigator;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# API Stubs (Optional: User can override via Env Vars)
nlp.api.url=${NLP_API_URL:https://api.example-nlp.com/v1/extract-skills}
nlp.api.key=${NLP_API_KEY:default-key}
llm.api.url=${LLM_API_URL:https://api.example-llm.com/v1/chat/completions}
llm.api.key=${LLM_API_KEY:default-llm-key}
