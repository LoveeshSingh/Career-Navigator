spring.application.name=career-navigator

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/careernavigator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# External NLP API Configuration
nlp.api.url=https://api.example-nlp.com/v1/extract-skills
nlp.api.key=${NLP_API_KEY:default-key}
