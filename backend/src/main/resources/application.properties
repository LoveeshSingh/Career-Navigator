spring.application.name=career-navigator

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/careernavigator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LLM API Configuration (OpenAI or equivalent)
llm.api.url=${LLM_API_URL:https://api.openai.com/v1/chat/completions}
llm.api.key=${LLM_API_KEY:default-llm-key}
